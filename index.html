<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
  min-height: 100vh;
  overflow-x: hidden;
}

/* MODALES */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

/* CAJA */
.modal-contenido {
  background: rgba(255, 255, 255, 0.08);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.15);
  animation: aparecer 0.4s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

/* efecto pop cuando aparece la imagen */
.pop {
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% { transform: scale(0.6); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

h2 {
  font-size: 20px;
  font-weight: 600;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
  width: 100%;
  max-width: 250px;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 18px rgba(0,114,255,0.5);
}

.modal-contenido img {
  width: 100%;
  max-height: 60vh;
  object-fit: cover;
  border-radius: 15px;
  margin-top: 10px;
}
</style>

</head>
<body>

<!-- MODAL 1 -->
<div id="modal1" class="modal">
  <div class="modal-contenido">
    <h2>💌 Tienes una invitación</h2>
    <button onclick="siguiente()">Aceptar</button>
  </div>
</div>

<!-- MODAL 2 -->
<div id="modal2" class="modal" style="display:none;">
  <div class="modal-contenido">
    <h2>⚠️ No hay vuelta atrás</h2>
    <button onclick="mostrarImagen()">Aceptar</button>
  </div>
</div>

<!-- MODAL IMAGEN -->
<div id="modalImg" class="modal" style="display:none;">
  <div class="modal-contenido pop" id="card">
    <h2>Ya aceptaste :3</h2>
    <img src="invito.jpg" alt="Invitación">
    <button onclick="reiniciar()">Cerrar</button>
  </div>
</div>

<script>
function siguiente() {
  document.getElementById("modal1").style.display = "none";
  document.getElementById("modal2").style.display = "flex";
}

function mostrarImagen() {
  document.getElementById("modal2").style.display = "none";

  const modal = document.getElementById("modalImg");
  const card = document.getElementById("card");

  modal.style.display = "flex";

  // reinicia animación
  card.classList.remove("pop");
  void card.offsetWidth;
  card.classList.add("pop");

  lanzarConfeti();
}

function reiniciar() {
  document.getElementById("modalImg").style.display = "none";
  document.getElementById("modal1").style.display = "flex";
}

/* 🎉 confeti simple sin librerías */
function lanzarConfeti() {
  for (let i = 0; i < 60; i++) {
    const confeti = document.createElement("div");
    confeti.style.position = "fixed";
    confeti.style.width = "6px";
    confeti.style.height = "6px";
    confeti.style.background = ["#00c6ff", "#ffcc00", "#ff4d4d", "#ffffff"][Math.floor(Math.random()*4)];
    confeti.style.left = Math.random() * 100 + "vw";
    confeti.style.top = "-10px";
    confeti.style.opacity = "0.8";
    confeti.style.zIndex = "9999";
    confeti.style.borderRadius = "50%";

    document.body.appendChild(confeti);

    const fall = confeti.animate([
      { transform: "translateY(0px)" },
      { transform: "translateY(100vh)" }
    ], {
      duration: 2000 + Math.random() * 2000,
      easing: "cubic-bezier(.2,.8,.2,1)"
    });

    fall.onfinish = () => confeti.remove();
  }
}
</script>

</body>
</html>
