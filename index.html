<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #1e3c72, #2a5298);
  min-height: 100vh;
  overflow-x: hidden;
}

/* MODALES */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

/* CAJA */
.modal-contenido {
  background: rgba(255, 255, 255, 0.1);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  animation: aparecer 0.6s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

h2 {
  font-size: 20px;
  margin-bottom: 10px;
}

/* BOTONES */
button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  width: 100%;
  max-width: 250px;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,114,255,0.5);
}

/* IMAGEN DENTRO DEL MODAL */
.modal-contenido img {
  width: 100%;
  max-height: 60vh;
  object-fit: cover;
  border-radius: 15px;
  margin-top: 10px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .modal-contenido {
    padding: 20px;
    border-radius: 15px;
  }

  h2 {
    font-size: 18px;
  }

  button {
    font-size: 14px;
  }
}
</style>

</head>
<body>

<!-- Modal 1 -->
<div id="modal1" class="modal">
  <div class="modal-contenido">
    <h2>💌 Tienes una invitación</h2>
    <button onclick="siguiente()">Aceptar</button>
  </div>
</div>

<!-- Modal 2 -->
<div id="modal2" class="modal" style="display:none;">
  <div class="modal-contenido">
    <h2>⚠️ No hay vuelta atrás</h2>
    <button onclick="mostrarImagen()">Aceptar</button>
  </div>
</div>

<!-- Modal Imagen -->
<div id="modalImg" class="modal" style="display:none;">
  <div class="modal-contenido">
    <h2>🎉 Aquí está tu invitación</h2>
    <img src="invito.jpg" alt="Invitación">
    <button onclick="cerrarTodo()">Cerrar</button>
  </div>
</div>

<script>
function siguiente() {
  document.getElementById("modal1").style.display = "none";
  document.getElementById("modal2").style.display = "flex";
}

function mostrarImagen() {
  document.getElementById("modal2").style.display = "none";
  document.getElementById("modalImg").style.display = "flex";
}

function cerrarTodo() {
  document.getElementById("modalImg").style.display = "none";
}
</script>

</body>
</html>
